name: Build & Deploy Pages

on:
  push:
    branches: [ main ]   # 你的預設分支
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Generate news index
        run: npm run build:news

      - name: Prepare Pages artifact
        run: |
          rm -rf _site
          mkdir -p _site
          cp -R \
            404.html \
            CNAME \
            about \
            assets \
            contact \
            css \
            dist \
            esg \
            footer.html \
            header.html \
            index.html \
            investors \
            js \
            news \
            products \
            robots.txt \
            sitemap.xml \
            _site/
          find _site -name ".DS_Store" -delete

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
